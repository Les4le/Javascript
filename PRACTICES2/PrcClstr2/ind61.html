<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <form id="loginForm">
    <input type="text" id="usernameInput" placeholder="Введіть логін" required>
    <label><input type="checkbox" id="rememberMe">Запам'ятати мене</label>
    <button type="submit">Увійти</button>
  </form>
  <p id="welcomeMessage"></p>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('usernameInput').value;
      const remember = document.getElementById('rememberMe').checked;

      const message = remember
        ? `Привіт, ${name}! Я запам'ятав тебе.`
        : `Привіт, ${name}!`;

      document.getElementById('welcomeMessage').innerText = message;
    });
  </script>
</body>

</html>
