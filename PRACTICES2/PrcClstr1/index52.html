<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <button id="openModalBtn">Відкрити вікно</button>

  <div id="myModal"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center;">
    <div style="background: white; padding: 20px; border-radius: 5px; text-align: center; min-width: 250px;">
      <h3>Модальне вікно</h3>
      <p>Якийсь контент...</p>
      <button id="closeModalBtn">Закрити</button>
    </div>
  </div>

  <script>
    const modal = document.getElementById('myModal');
    document.getElementById('openModalBtn').addEventListener('click', () => modal.style.display = 'flex');
    document.getElementById('closeModalBtn').addEventListener('click', () => modal.style.display = 'none');
  </script>
</body>

</html>
