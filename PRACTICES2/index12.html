<body>
    <script>
        const promTask = new Promise((resolve, reject) => {
            const isSuccess = true;
            if (isSuccess) {
                resolve("Task is completed");
            } else {
                reject("Task is NOT completed");
            }
        })
        
        const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

        async function theTask1() {
            await delay(1000);
            console.log("First task")
            console.log(promTask);
        }

        async function theTask2() {
            await delay(2000); 
            console.log("Second task")
            console.log(promTask);
        }

        async function theTask3() {
            await delay(3000); 
            console.log("Third task")
            console.log(promTask);
        }
        
        async function executeAll() {
            console.log("Executing all tasks, folowing delay is 1 second...")
       
            theTask1();
       
            theTask2();
       
            theTask3();
        }

        async function main() {
            await executeAll();
            await delay(4000);
            console.log("Completed All")
            
        }

async function sumArrayAsync(array) {
    let sum = 0;
    if (array.length === 0) {
        console.log("Array is null dummy");
    } else {
    for (let i = 0; i < array.length; i++) {
        await delay(1000)
        sum += array[i];
    }
    console.log("done the sum is: ");    
    console.log(sum)
    }
}
