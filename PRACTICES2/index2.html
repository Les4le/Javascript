<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    const rectangle = {
      topLeft: { x: 2, y: 8 },
      bottomRight: { x: 10, y: 2 }
    };

    function printInfo(rect) {
      console.log(`Прямокутник: ліва верхня (${rect.topLeft.x}, ${rect.topLeft.y}), права нижня (${rect.bottomRight.x}, ${rect.bottomRight.y})`);
    }

    function getWidth(rect) {
      return Math.abs(rect.bottomRight.x - rect.topLeft.x);
    }

    function getHeight(rect) {
      return Math.abs(rect.topLeft.y - rect.bottomRight.y);
    }

    function getArea(rect) {
      return getWidth(rect) * getHeight(rect);
    }

    function getPerimeter(rect) {
      return 2 * (getWidth(rect) + getHeight(rect));
    }

    // 6. Зміна ширини
    function changeWidth(rect, value) {
      rect.bottomRight.x += value;
    }

    function changeHeight(rect, value) {
      rect.bottomRight.y -= value;
    }

    function changeDimensions(rect, dw, dh) {
      changeWidth(rect, dw);
      changeHeight(rect, dh);
    }

    function shiftX(rect, value) {
      rect.topLeft.x += value;
      rect.bottomRight.x += value;
    }

    function shiftY(rect, value) {
      rect.topLeft.y += value;
      rect.bottomRight.y += value;
    }

    function shiftXY(rect, dx, dy) {
      shiftX(rect, dx);
      shiftY(rect, dy);
    }

    function isPointInside(rect, point) {
      return point.x >= rect.topLeft.x &&
        point.x <= rect.bottomRight.x &&
        point.y >= rect.bottomRight.y &&
        point.y <= rect.topLeft.y;
    }

    printInfo(rectangle);
    console.log("Ширина:", getWidth(rectangle));
    console.log("Площа:", getArea(rectangle));
    console.log("Точка (5,5) всередині?", isPointInside(rectangle, { x: 5, y: 5 }));
  </script>
</body>

</html>
