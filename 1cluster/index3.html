<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .container {
      max-width: 600px;
    }

    .toolbar {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
      background: #fff;
    }

    .toolbar label {
      display: flex;
      align-items: center;
      font-size: 14px;
      cursor: pointer;
    }

    .toolbar input {
      margin-right: 5px;
    }

    textarea {
      width: 100%;
      height: 100px;
      font-family: inherit;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 6px;
      border: 1px solid #999;
      background: #e1e1e1;
      cursor: pointer;
    }

    button:hover {
      background: #d4d4d4;
    }

    .result-container {
      margin-top: 20px;
      display: none;
    }

    .result-title {
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 16px;
    }

    .result-box {
      border: 1px solid #ccc;
      padding: 15px;
      font-size: 14px;
      background: #fff;
      min-height: 50px;
      white-space: pre-wrap;
    }
  </style>
  <title>Document</title>
</head>

<body>
  <div class="container">

    <div class="toolbar">
      <label><input type="checkbox" id="bold"> Bold</label>
      <label><input type="checkbox" id="underline"> Underline</label>
      <label><input type="checkbox" id="italics"> Italics</label>
      |
      <label><input type="radio" name="align" value="left" checked> Left</label>
      <label><input type="radio" name="align" value="right"> Right</label>
      <label><input type="radio" name="align" value="justify"> Justify</label>
    </div>

    <textarea id="textInput" placeholder="Введіть ваш текст тут..."></textarea>
    <button onclick="applyStyles()">Show text</button>

    <div class="result-container" id="resultContainer">
      <div class="result-title">Result:</div>
      <div class="result-box" id="resultBox"></div>
    </div>
  </div>

  <script>
    function applyStyles() {
      const textInput = document.getElementById('textInput').value;
      const resultContainer = document.getElementById('resultContainer');
      const resultBox = document.getElementById('resultBox');

      if (!textInput.trim()) {
        alert("Будь ласка, введіть якийсь текст.");
        return;
      }

      const isBold = document.getElementById('bold').checked;
      const isUnderline = document.getElementById('underline').checked;
      const isItalics = document.getElementById('italics').checked;

      const selectedAlign = document.querySelector('input[name="align"]:checked').value;

      resultBox.style.fontWeight = isBold ? 'bold' : 'normal';
      resultBox.style.textDecoration = isUnderline ? 'underline' : 'none';
      resultBox.style.fontStyle = isItalics ? 'italic' : 'normal';
      resultBox.style.textAlign = selectedAlign;

      resultBox.textContent = textInput;
      resultContainer.style.display = 'block';
    }
  </script>
</body>

</html>
