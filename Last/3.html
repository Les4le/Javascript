<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      padding: 30px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #17a2b8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #138496;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #f8f9fa;
      margin-bottom: 10px;
      padding: 12px;
      border-left: 5px solid #17a2b8;
      border-radius: 3px;
      font-weight: bold;
    }

    li ul {
      margin-top: 8px;
      border-left: none;
    }

    li ul li {
      background: transparent;
      border-left: none;
      padding: 3px 0;
      font-weight: normal;
      color: #555;
      margin: 0;
      font-size: 14px;
    }
  </style>
  <title>Document</title>
</head>

<body>

  <div class="container">
    <h1>Список авторів та книг</h1>
    <button id="loadAuthorsBtn">Завантажити авторів</button>
    <ul id="authorsList"></ul>
  </div>

  <script>
    document.getElementById('loadAuthorsBtn').addEventListener('click', async () => {
      const listContainer = document.getElementById('authorsList');
      listContainer.innerHTML = '<li>Завантаження...</li>';

      try {

        const usersResponse = await fetch('https://jsonplaceholder.typicode.com/users');
        const users = await usersResponse.json();

        listContainer.innerHTML = ''; // Очищення перед виводом

        for (let user of users) {
          const liAuthor = document.createElement('li');
          liAuthor.textContent = `Автор: ${user.name} (${user.email})`;

          const postsResponse = await fetch(`https://jsonplaceholder.typicode.com/posts?userId=${user.id}`);
          const posts = await postsResponse.json();

          const ulBooks = document.createElement('ul');

          posts.slice(0, 2).forEach(post => {
            const liBook = document.createElement('li');
            liBook.textContent = `📖 "${post.title}"`;
            ulBooks.appendChild(liBook);
          });

          liAuthor.appendChild(ulBooks);
          listContainer.appendChild(liAuthor);
        }

      } catch (error) {
        listContainer.innerHTML = '<li style="border-color:red; color:red;">Не вдалося завантажити дані. Спробуйте пізніше.</li>';
        console.error(error);
      }
    });
  </script>

</body>

</html>
