<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f9f9f9;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
    }

    button:hover {
      background-color: #0056b3;
    }

    #timeResult {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }
  </style>
  <title>Document</title>
</head>

<body>
  <button id="getTimeBtn">Отримати час</button>
  <div id="timeResult">--:--:--</div>

  <script>
    document.getElementById('getTimeBtn').addEventListener('click', function () {
      const xhr = new XMLHttpRequest();

      xhr.open('GET', 'https://worldtimeapi.org/api/timezone/Europe/Kyiv', true);

      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            const response = JSON.parse(xhr.responseText);
            const datetime = new Date(response.datetime);
            const timeString = datetime.toTimeString().split(' ')[0];
            document.getElementById('timeResult').textContent = timeString;
          } else {
            document.getElementById('timeResult').textContent = 'Помилка завантаження';
          }
        }
      };
      xhr.send();
    });
  </script>
</body>

</html>
