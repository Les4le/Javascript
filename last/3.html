<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 5px;
      background-color: #f0f2f5;
    }

    .card {
      max-width: 400px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background-color: #218838;
    }

    button:disabled {
      background-color: #6c757d;
      cursor: not-allowed;
    }

    .img-container {
      margin-top: 20px;
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #ccc;
      border-radius: 8px;
      background: #fafafa;
      overflow: hidden;
    }

    img {
      max-width: 100%;
      max-height: 350px;
      object-fit: contain;
      display: none;
    }

    .status {
      font-size: 16px;
      color: #555;
      font-style: italic;
    }

    .error {
      color: #dc3545;
      font-weight: bold;
    }
  </style>
  <title>Document</title>
</head>

<body>
  <div class="card">
    <h2>Генератор випадкових собак</h2>
    <button id="getDogBtn">Отримати собаку</button>
    <div class="img-container">
      <div id="statusText" class="status">Натисніть кнопку, щоб знайти песика</div>
      <img id="dogImg" src="" alt="Random Dog">
    </div>
  </div>

  <script>
    const btn = document.getElementById('getDogBtn');
    const img = document.getElementById('dogImg');
    const statusText = document.getElementById('statusText');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      img.style.display = 'none';
      statusText.style.display = 'block';
      statusText.className = 'status';
      statusText.textContent = 'Шукаємо хвостика...';

      try {
        const response = await fetch('https://dog.ceo/api/breeds/image/random');

        if (!response.open && !response.ok) {
          throw new Error('Помилка сервера');
        }

        const data = await response.json();

        img.src = data.message;

        img.onload = () => {
          statusText.style.display = 'none';
          img.style.display = 'block';
          btn.disabled = false;
        };

      } catch (error) {
        statusText.className = 'error';
        statusText.textContent = 'Не вдалося завантажити фото. Спробуйте ще раз';
        btn.disabled = false;
      }
    });
  </script>
</body>

</html>
