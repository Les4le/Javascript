<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff9f2;
      padding: 20px;
      max-width: 800px;
    }

    .article h2 {
      margin-bottom: 5px;
    }

    .article p {
      line-height: 1.4;
      color: #333;
    }

    hr {
      border: 0;
      border-top: 1px solid #ccc;
      margin: 20px 0;
    }

    .comments-section h3 {
      margin-bottom: 15px;
    }

    .comment {
      margin-bottom: 20px;
    }

    .comment-author {
      font-weight: bold;
      font-size: 16px;
    }

    .comment-date {
      font-size: 12px;
      color: #666;
      margin: 3px 0 6px 0;
    }

    .comment-text {
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
    }

    .form-group input[type="text"] {
      width: 300px;
      padding: 4px;
    }

    .form-group textarea {
      width: 100%;
      height: 80px;
      padding: 4px;
      resize: vertical;
    }

    #addCommentBtn {
      width: 100%;
      padding: 8px;
      cursor: pointer;
      background: linear-gradient(to bottom, #fff, #e6e6e6);
      border: 1px solid #adadad;
    }
  </style>
  <title>Document</title>
</head>

<body>
  <div class="article">
    <h2>What is Lorem Ipsum?</h2>
    <p>Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's
      standard dummy text ever since the 1500s...</p>
  </div>

  <hr>

  <div class="comments-section">
    <div id="commentsList">
      <div class="comment">
        <div class="comment-author">Antoine</div>
        <div class="comment-date">22.03.2018</div>
        <div class="comment-text">Best comment from Antoine!</div>
      </div>
    </div>
  </div>

  <hr>

  <h3>Leave you comment</h3>
  <form id="commentForm">
    <div class="form-group">
      <label for="username">Name:</label>
      <input type="text" id="username" required>
    </div>
    <div class="form-group">
      <label for="commentText">Comment:</label>
      <textarea id="commentText" required></textarea>
    </div>
    <button type="submit" id="addCommentBtn">Add comment</button>
  </form>

  <script>
    const commentForm = document.getElementById('commentForm');
    const commentsList = document.getElementById('commentsList');

    commentForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const nameInput = document.getElementById('username');
      const textInput = document.getElementById('commentText');

      const now = new Date();
      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();
      const formattedDate = `${day}.${month}.${year}`;

      const commentDiv = document.createElement('div');
      commentDiv.className = 'comment';

      commentDiv.innerHTML = `
                  <div class="comment-author">${nameInput.value}</div>
                  <div class="comment-date">${formattedDate}</div>
                  <div class="comment-text">${textInput.value}</div>
              `;


      commentsList.appendChild(commentDiv);
      commentForm.reset();
    });
  </script>
</body>

</html>
